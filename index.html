<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Masuk — e-Hartanah Portal</title>
  <style>
    :root {
      --color-primary: 13, 27, 42;
      --bg-1: 243, 244, 246;
      --bg-2: 255, 255, 255;
      --border-color: 228, 228, 231;
      --fk-border-color: 228, 228, 231;
      --fk-placeholder-color: 146, 146, 153;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: rgb(var(--color-primary));
      background: rgb(var(--bg-1));
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 520px;
      padding: 24px 16px;
    }

    .login-card {
      background: rgb(var(--bg-2));
      border: 1px solid rgba(var(--border-color), 0.8);
      border-radius: 0.5rem;
      padding: 48px 56px;
      box-shadow: rgba(36,35,71,0.05) 0px 1px 1px, rgba(36,35,71,0.05) 0px 0px 1px 1px;
    }
    @media (max-width: 600px) {
      .login-card {
        border-radius: 0;
        border-left: none;
        border-right: none;
        padding: 40px 24px;
      }
    }

    .login-card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: rgb(var(--color-primary));
      margin: 0 0 16px;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .login-card .subtitle {
      font-size: 0.95rem;
      color: #6b7280;
      margin: 0 0 32px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: rgb(var(--color-primary));
      margin-bottom: 6px;
      text-align: left;
    }

    .form-input {
      width: 100%;
      height: 40px;
      border: 1px solid rgb(var(--fk-border-color));
      border-radius: 0.5rem;
      padding: 0 12px;
      font-size: 0.875rem;
      font-family: inherit;
      color: rgb(var(--color-primary));
      background: rgb(var(--bg-2));
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus {
      border-color: rgb(var(--color-primary));
    }
    .form-input::placeholder {
      color: rgb(var(--fk-placeholder-color));
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: 0.875rem;
    }

    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .form-checkbox input[type=checkbox] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: rgb(var(--color-primary));
    }

    .form-link {
      color: rgb(var(--color-primary));
      text-decoration: none;
      font-size: 0.875rem;
    }
    .form-link:hover { text-decoration: underline; }

    .btn-signin {
      width: 100%;
      height: 44px;
      background: rgb(var(--color-primary));
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-signin:hover { opacity: 0.88; }
    .btn-signin:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-google {
      width: 100%;
      height: 44px;
      background: #fff;
      color: rgb(var(--color-primary));
      border: 1px solid rgb(var(--border-color));
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: box-shadow 0.15s;
    }
    .btn-google:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.08); }

    .signup-link {
      text-align: center;
      font-size: 0.875rem;
      color: #6b7280;
      margin-top: 24px;
    }
    .signup-link a { color: rgb(var(--color-primary)); text-decoration: none; }
    .signup-link a:hover { text-decoration: underline; }

    .err-box {
      display: none;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 0.4rem;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: #991b1b;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <h1>Log Masuk</h1>
    <p class="subtitle">Selamat datang ke e-Hartanah Portal. Sila log masuk untuk teruskan.</p>

    <div class="err-box" id="err">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="flex-shrink:0;"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <span id="err-msg">Sila isi nama pengguna dan kata laluan.</span>
    </div>

    <form onsubmit="doLogin(event)">

      <div class="form-group">
        <label class="form-label" for="email">Nama Pengguna</label>
        <input id="email" class="form-input" type="text" placeholder="contoh: kewangan@ehartanah.gov.my" autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Kata Laluan</label>
        <input id="password" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <div class="form-row">
        <label class="form-checkbox">
          <input type="checkbox" id="remember">
          Ingat saya
        </label>
        <a href="#" class="form-link">Lupa kata laluan?</a>
      </div>

      <button type="submit" class="btn-signin" id="submit-btn">
        <span id="btn-label">Log Masuk</span>
        <span id="btn-loading" style="display:none;align-items:center;gap:8px;">
          <svg width="14" height="14" stroke="currentColor" viewBox="0 0 24 24" style="animation:spin 0.7s linear infinite;"><path fill="none" stroke-width="2.5" d="M12 2a10 10 0 0110 10" stroke-linecap="round"/></svg>
          Sedang log masuk...
        </span>
      </button>

      <button type="button" class="btn-google" onclick="alert('Google Sign-In tidak tersedia dalam mod demo.')">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Log Masuk dengan Google
      </button>

    </form>

    <p class="signup-link">
      Belum ada akaun? <a href="#">Daftar</a>
    </p>

  </div>
</div>

<script>
  const ROLE_MAP = {
    'tanah':     'Unit Tanah',
    'fasiliti':  'Unit Fasiliti',
    'pajakan':   'Unit Pajakan',
    'kewangan':  'Kewangan',
    'undang':    'Undang-undang',
    'admin':     'Admin',
    'pengarah':  'Pengurusan',
  };

  const DISPLAY_NAMES = {
    'Unit Tanah':     'Pegawai Tanah',
    'Unit Fasiliti':  'Pegawai Fasiliti',
    'Unit Pajakan':   'Pegawai Pajakan',
    'Kewangan':       'Pegawai Kewangan',
    'Undang-undang':  'Pegawai Undang-undang',
    'Admin':          'Pentadbir Sistem',
    'Pengurusan':     'Pengarah',
  };

  function doLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('password').value.trim();
    const err   = document.getElementById('err');

    err.style.display = 'none';

    if (!email || !pw) {
      err.style.display = 'flex';
      document.getElementById('err-msg').textContent = 'Sila isi nama pengguna dan kata laluan.';
      return;
    }

    const prefix = email.split('@')[0].toLowerCase();
    const role   = ROLE_MAP[prefix] || 'Admin';
    const name   = DISPLAY_NAMES[role] || prefix;

    document.getElementById('btn-label').style.display    = 'none';
    document.getElementById('btn-loading').style.display  = 'flex';
    document.getElementById('submit-btn').disabled        = true;

    setTimeout(() => {
      localStorage.setItem('ehartanah_user', JSON.stringify({
        name, role, email, loginAt: new Date().toISOString()
      }));
      window.location.href = 'dashboard.html';
    }, 900);
  }
</script>
</body>
</html>
